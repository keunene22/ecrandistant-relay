name: 🚀 Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Contabo VPS
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 194.163.188.237
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "📥 Récupération du code..."
            cd /root/ecrandistant
            git pull origin main

            echo "🌐 Mise à jour du client web..."
            cp /root/ecrandistant/webclient/index.html /var/www/ecrandistant/index.html

            echo "🔄 Redémarrage du service..."
            systemctl restart ecrandistant

            echo "✅ Déployé avec succès !"
            systemctl status ecrandistant --no-pager | head -5
