name: 🚀 Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Contabo VPS
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 194.163.188.237
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "📥 Récupération du code..."
            cd /root/ecrandistant
            git fetch origin main
            git reset --hard origin/main

            echo "🔍 Vérification nouveau code:"
            grep -c "requested_sid" relay/server.py && echo "OK nouveau code" || echo "ERREUR ancien code"

            echo "🔄 Redémarrage du service..."
            systemctl restart ecrandistant
            sleep 2

            echo "✅ Statut:"
            systemctl status ecrandistant --no-pager | head -8
