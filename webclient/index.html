<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="EcranDistant">
<title>EcranDistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#1e1e2e;color:#cdd6f4;font-family:'Segoe UI',sans-serif;height:100dvh;overflow:hidden}

/* ── Connect screen ── */
#connect{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100dvh;padding:24px;gap:14px}
#connect h1{font-size:26px;color:#89b4fa;font-weight:700;margin-bottom:6px}
#connect p{color:#6c7086;font-size:13px;text-align:center}
.card{background:#181825;border:1px solid #313244;border-radius:12px;
  padding:20px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px}
label{font-size:12px;color:#6c7086;margin-bottom:2px;display:block}
input{background:#313244;border:1px solid #45475a;border-radius:8px;
  padding:10px 14px;color:#cdd6f4;font-size:15px;width:100%;outline:none}
input:focus{border-color:#89b4fa}
.btn{border:none;border-radius:8px;padding:12px;font-size:15px;
  font-weight:600;cursor:pointer;width:100%;transition:.15s}
.btn-primary{background:#89b4fa;color:#1e1e2e}
.btn-primary:active{background:#b4d0fb}
.btn-danger{background:#f38ba8;color:#1e1e2e}
#status-msg{font-size:13px;color:#f9e2af;text-align:center;min-height:18px}

/* ── Viewer screen ── */
#viewer{display:none;flex-direction:column;height:100dvh}
#toolbar{display:flex;align-items:center;gap:8px;padding:6px 10px;
  background:#181825;border-bottom:1px solid #313244;flex-shrink:0;overflow-x:auto}
.tbtn{background:#313244;border:none;border-radius:6px;color:#cdd6f4;
  padding:6px 12px;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tbtn:active{background:#585b70}
.tbtn.active{background:#89b4fa;color:#1e1e2e}
#canvas-wrap{flex:1;overflow:hidden;position:relative;background:#000;
  display:flex;align-items:center;justify-content:center;touch-action:none}
#screen{max-width:100%;max-height:100%;display:block;
  transform-origin:center center;will-change:transform}
#kbd-input{position:fixed;left:-9999px;top:0;opacity:0;width:1px;height:1px}
#audio-banner{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  background:#313244;border-radius:20px;padding:8px 16px;font-size:13px;
  color:#f9e2af;display:none;z-index:99}

/* ── Overlay panels (chat / files) ── */
.panel{position:fixed;bottom:0;left:0;right:0;background:#181825;border-top:2px solid #313244;
  max-height:60dvh;display:none;flex-direction:column;z-index:200;border-radius:16px 16px 0 0}
.panel.open{display:flex}
.panel-header{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #313244;flex-shrink:0}
.panel-header span{flex:1;font-weight:700;color:#89b4fa}
.panel-close{background:none;border:none;color:#6c7086;font-size:20px;cursor:pointer;padding:0 4px}
.panel-body{overflow-y:auto;flex:1;padding:12px}

/* Chat */
#chat-log{display:flex;flex-direction:column;gap:8px;min-height:60px}
.chat-msg{border-radius:10px;padding:8px 12px;max-width:80%;font-size:14px;line-height:1.4}
.chat-msg.me{background:#313244;align-self:flex-end;color:#cdd6f4}
.chat-msg.host{background:#1e3a5f;align-self:flex-start;color:#89b4fa}
.chat-msg .who{font-size:11px;opacity:.6;margin-bottom:2px}
#chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #313244;flex-shrink:0}
#chat-input{flex:1;background:#313244;border:1px solid #45475a;border-radius:8px;
  padding:8px 12px;color:#cdd6f4;font-size:15px;outline:none}
#chat-send{background:#89b4fa;color:#1e1e2e;border:none;border-radius:8px;
  padding:8px 16px;font-weight:700;cursor:pointer}

/* File browser */
#file-list{display:flex;flex-direction:column;gap:4px}
.file-entry{display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:#1e1e2e;border-radius:8px;cursor:pointer;border:1px solid #313244}
.file-entry:active{background:#313244}
.file-icon{font-size:20px;flex-shrink:0}
.file-name{flex:1;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-size:11px;color:#6c7086;flex-shrink:0}
#file-path-bar{display:flex;align-items:center;gap:6px;padding:0 0 8px}
#file-path-lbl{flex:1;font-size:12px;color:#89b4fa;overflow:hidden;text-overflow:ellipsis}
#file-progress{display:none;flex-direction:column;gap:6px;padding:10px 0}
#file-prog-bar{height:8px;background:#313244;border-radius:4px;overflow:hidden}
#file-prog-fill{height:100%;background:#a6e3a1;border-radius:4px;width:0%;transition:width .2s}
#file-prog-lbl{font-size:12px;color:#cdd6f4;text-align:center}
/* Upload area */
#upload-area{border:2px dashed #45475a;border-radius:12px;padding:24px;text-align:center;
  color:#6c7086;font-size:14px;margin-bottom:10px;cursor:pointer}
#upload-area:active{border-color:#89b4fa;color:#cdd6f4}
</style>
</head>
<body>

<!-- ══ CONNECT SCREEN ══════════════════════════════════════════════════ -->
<div id="connect">
  <h1>🖥 EcranDistant</h1>
  <p>Contrôlez votre PC depuis votre téléphone</p>

  <div class="card">
    <div>
      <label>Relay URL</label>
      <input id="relay-url" value="wss://api.194.163.188.237.nip.io/relay" placeholder="relay URL">
    </div>
    <div>
      <label>Session ID</label>
      <input id="session-id" placeholder="ex: ABC123" autocapitalize="characters" style="letter-spacing:4px;font-size:20px;font-weight:700;text-align:center">

<!-- ══ VIEWER SCREEN ══════════════════════════════════════════════════ -->
<div id="viewer">
  <div id="toolbar">
    <button class="tbtn" onclick="disconnect()">⏹ Quitter</button>
    <button class="tbtn" id="btn-kbd" onclick="toggleKbd()">⌨️ Clavier</button>

    <button class="tbtn" onclick="zoomBy(1.3)" style="padding:6px 10px;font-size:15px">＋</button>

    <button class="tbtn" onclick="resetView()" id="zoom-btn" style="min-width:46px;font-size:11px">100%</button>

  </div>
  <div id="canvas-wrap">

</div>

<!-- ══ CHAT PANEL ══════════════════════════════════════════════════════ -->
<div id="chat-panel" class="panel">
  <div class="panel-header">
    <span>💬 Chat</span>
    <button class="panel-close" onclick="closePanel('chat-panel')">✕</button>
  </div>
  <div class="panel-body" id="chat-log"></div>
  <div id="chat-input-row">
    <input id="chat-input" placeholder="Message…" autocorrect="off" spellcheck="false">
    <button id="chat-send" onclick="sendChatMsg()">▶</button>
  </div>
</div>

<!-- ══ FILE PANEL ═══════════════════════════════════════════════════════ -->
<div id="file-panel" class="panel">
  <div class="panel-header">
    <span>📁 Fichiers</span>
    <button class="panel-close" onclick="closePanel('file-panel')">✕</button>
  </div>
  <div class="panel-body">

    <!-- Upload section -->
    <div style="font-size:12px;color:#6c7086;margin-bottom:6px">📤 ENVOYER VERS LE HOST</div>
    <div id="upload-area" onclick="document.getElementById('file-input').click()">
      📂  Appuyez pour choisir un fichier
    </div>
    <input id="file-input" type="file" style="display:none">

    <div id="file-progress">
      <div id="file-prog-bar"><div id="file-prog-fill"></div></div>
      <div id="file-prog-lbl">0 / 0</div>
    </div>

    <!-- Browse section -->
    <div style="font-size:12px;color:#6c7086;margin:12px 0 6px">📥 TÉLÉCHARGER DEPUIS LE HOST</div>
    <div id="file-path-bar">
      <span id="file-path-lbl">…</span>
      <button class="tbtn" onclick="fileBrowseParent()" style="padding:4px 10px">↑</button>
      <button class="tbtn" onclick="fileBrowse(fileCurPath)" style="padding:4px 10px">🔄</button>
    </div>
    <div id="file-list"></div>
  </div>
</div>

<!-- Hidden keyboard input -->
<input id="kbd-input" type="text" autocomplete="off" autocorrect="off"
       autocapitalize="off" spellcheck="false">

<script>
// ── Constants ──────────────────────────────────────────────────────────
const MSG_FRAME=0x01,MSG_MOUSE=0x02,MSG_KEY=0x03,MSG_AUTH=0x04,
      MSG_AUTH_OK=0x05,MSG_AUTH_FAIL=0x06,MSG_PING=0x07,MSG_PONG=0x08,
      MSG_CONFIG=0x09,MSG_SELECT_MON=0x0A,MSG_MON_CHANGED=0x0B,
      MSG_CLIPBOARD=0x0C,MSG_AUDIO_CFG=0x0D,MSG_AUDIO=0x13,
      MSG_FILE_SEND_REQ=0x20,MSG_FILE_SEND_ACK=0x21,MSG_FILE_CHUNK=0x22,
      MSG_FILE_DONE=0x23,MSG_FILE_ABORT=0x24,MSG_FILE_BROWSE=0x25,
      MSG_FILE_LIST=0x26,MSG_FILE_GET_REQ=0x27,MSG_FILE_GET_INFO=0x28,
      MSG_CHAT=0x30;

// ── State ──────────────────────────────────────────────────────────────
let ws=null, remoteW=1920, remoteH=1080;
let audioEnabled=false, audioCtx=null, audioQueue=[], audioPlaying=false;
let audioSR=48000, audioCH=2, audioNode=null;
let frameCount=0, lastFpsT=Date.now();
const enc=new TextEncoder(), dec=new TextDecoder();

// File state
let fileCurPath='', fileCurParent='';
let fileDownloads={};   // tid → {name, size, parts:[Uint8Array]}
let fileUploadId=null;
let fileAckWaiters={};  // tid → {resolve, reject}

// ── Protocol ──────────────────────────────────────────────────────────
function encodeJson(type, payload){
  const j=enc.encode(JSON.stringify(payload));
  const b=new Uint8Array(1+j.length);
  b[0]=type; b.set(j,1);
  return b.buffer;
}

function decodeMsg(buf){
  const b=new Uint8Array(buf);
  const t=b[0];
  if(t===MSG_FRAME){
    const w=(b[1]<<8)|b[2], h=(b[3]<<8)|b[4];
    return {_t:'frame',w,h,jpeg:b.slice(5)};
  }
  if(t===MSG_AUDIO){
    const sr=(b[1]<<8)|b[2], ch=b[3];
    const pcm=pako.inflate(b.slice(4));
    return {_t:'audio',sr,ch,pcm};
  }
  if(t===MSG_FILE_CHUNK){
    const tid=((b[1]<<24)|(b[2]<<16)|(b[3]<<8)|b[4])>>>0;
    return {_t:'file_chunk',_mt:MSG_FILE_CHUNK,id:tid,data:b.slice(5)};
  }
  try{
    const p=JSON.parse(dec.decode(b.slice(1)));
    p._mt=t; return p;
  }catch(e){return {_mt:t};}
}

function encodeFileChunk(tid, data){
  const buf=new Uint8Array(5+data.length);
  buf[0]=MSG_FILE_CHUNK;
  new DataView(buf.buffer).setUint32(1,tid,false);
  buf.set(data,5);
  return buf.buffer;
}

// ── Connect ───────────────────────────────────────────────────────────
function setStatus(msg){document.getElementById('status-msg').textContent=msg;}

async function connect(){
  let relay=document.getElementById('relay-url').value.trim();
  const sid=document.getElementById('session-id').value.trim().toUpperCase();
  const pwd=document.getElementById('password').value.trim();
  if(!relay||!sid||!pwd){setStatus('⚠ Remplissez tous les champs.');return;}

  // Fix scheme
  if(relay.startsWith('https://'))relay='wss://'+relay.slice(8);
  else if(relay.startsWith('http://'))relay='ws://'+relay.slice(7);
  else if(!relay.startsWith('ws'))relay='wss://'+relay;

  setStatus('🔄 Connexion au relay…');

  try{
    ws=new WebSocket(relay);
    ws.binaryType='arraybuffer';

    await new Promise((ok,fail)=>{
      const t=setTimeout(()=>fail(new Error('Timeout relay')),20000);
      ws.onopen=()=>{clearTimeout(t);ok();};
      ws.onerror=()=>{clearTimeout(t);fail(new Error('Erreur réseau'));};
    });

    // Join relay session
    ws.send(JSON.stringify({role:'client',session_id:sid}));
    setStatus('🔄 Rejoint la session…');

    const relayResp=await recvJson();
    if(relayResp.type==='error'){
      const reason=relayResp.reason||'Erreur inconnue';
      const expired=reason.toLowerCase().includes('not found')||reason.toLowerCase().includes('session');
      if(expired){
        document.getElementById('session-id').value='';
        setStatus('⚠️ Session expirée — entre le nouveau code affiché sur le PC');
      } else {
        setStatus('❌ '+reason);
      }
      ws.close(); return;
    }
    // type === 'joined'

    // Auth
    setStatus('🔐 Authentification…');
    ws.send(encodeJson(MSG_AUTH,{password:pwd}));

    const authResp=await recvBin();
    if(authResp._mt===MSG_AUTH_FAIL){setStatus('❌ Mauvais mot de passe.');ws.close();return;}
    if(authResp._mt!==MSG_AUTH_OK){setStatus('❌ Réponse inattendue.');ws.close();return;}

    remoteW=authResp.width||1920;
    remoteH=authResp.height||1080;

    // Sauvegarde les infos pour reconnexion rapide
    sessionStorage.setItem('lastSid', sid);
    sessionStorage.setItem('lastPwd', pwd);
    sessionStorage.setItem('lastRelay', relay);

    // Switch to viewer
    document.getElementById('connect').style.display='none';
    document.getElementById('viewer').style.display='flex';

    // Show audio banner
    if(authResp.audio){
      document.getElementById('audio-banner').style.display='block';
      setTimeout(()=>document.getElementById('audio-banner').style.display='none',4000);
    }

    // Start session loop
    ws.onmessage=onMessage;
    ws.onclose=()=>{
      const msg=fileUploadId
        ?'⚠️ Transfert interrompu — session déconnectée. Reconnecte-toi avec le même code.'
        :'🔌 Déconnecté — entre le code affiché sur le PC pour reprendre';
      fileUploadId=null;
      showConnect(msg);
    };
    ws.onerror=()=>{fileUploadId=null;showConnect('❌ Erreur réseau');};

    // FPS counter
    setInterval(updateFps,1000);

  }catch(e){
    setStatus('❌ '+e.message);
    if(ws)ws.close();
  }
}

function recvJson(){
  return new Promise((ok,fail)=>{
    const t=setTimeout(()=>fail(new Error('Timeout')),15000);
    ws.onmessage=e=>{
      clearTimeout(t);
      ws.onmessage=null;
      try{ok(JSON.parse(e.data));}catch(ex){fail(ex);}
    };
  });
}
function recvBin(){
  return new Promise((ok,fail)=>{
    const t=setTimeout(()=>fail(new Error('Timeout auth')),15000);
    ws.onmessage=e=>{
      clearTimeout(t);
      ws.onmessage=null;
      if(e.data instanceof ArrayBuffer)ok(decodeMsg(e.data));
      else{try{ok(JSON.parse(e.data));}catch(ex){fail(ex);}}
    };
  });
}

// ── Message handler ───────────────────────────────────────────────────
const canvas=document.getElementById('screen');
const ctx=canvas.getContext('2d');

function onMessage(e){
  if(!(e.data instanceof ArrayBuffer))return;
  const msg=decodeMsg(e.data);

  if(msg._t==='frame'){
    renderFrame(msg.jpeg);
    frameCount++;
  } else if(msg._t==='audio'){
    if(audioEnabled)playAudioChunk(msg);
  } else if(msg._mt===MSG_PONG){
    // pong ok

  // ── Chat ────────────────────────────────────────────────────────────
  } else if(msg._mt===MSG_CHAT){
    appendChat(msg.text, msg.sender||'host');

  // ── File: download info ──────────────────────────────────────────────
  } else if(msg._mt===MSG_FILE_GET_INFO){
    const {id,name,size}=msg;
    fileDownloads[id]={name,size,parts:[],received:0};
    showFileProgress(true, name, 0, size);

  // ── File: download chunk ─────────────────────────────────────────────
  } else if(msg._t==='file_chunk'){
    const dl=fileDownloads[msg.id];
    if(dl){
      dl.parts.push(msg.data.slice());
      dl.received+=msg.data.length;
      showFileProgress(true, dl.name, dl.received, dl.size);
    }

  // ── File: download done ──────────────────────────────────────────────
  } else if(msg._mt===MSG_FILE_DONE){
    const dl=fileDownloads[msg.id];
    if(dl){
      const blob=new Blob(dl.parts);
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=dl.name;
      a.click();
      delete fileDownloads[msg.id];
      showFileProgress(false);
      document.getElementById('file-prog-lbl').textContent='✅ Téléchargé !';
    }

  // ── File: abort ──────────────────────────────────────────────────────
  } else if(msg._mt===MSG_FILE_ABORT){
    delete fileDownloads[msg.id];
    showFileProgress(false);
    document.getElementById('file-prog-lbl').textContent='❌ '+msg.reason;

  // ── File: upload ack ─────────────────────────────────────────────────
  } else if(msg._mt===MSG_FILE_SEND_ACK){
    const w=fileAckWaiters[msg.id];
    if(w){
      delete fileAckWaiters[msg.id];
      if(msg.ok) w.resolve();
      else w.reject(new Error(msg.reason||'Fichier refusé par le PC'));
    }

  // ── File: directory listing ──────────────────────────────────────────
  } else if(msg._mt===MSG_FILE_LIST){
    fileCurPath=msg.path||'';
    fileCurParent=msg.parent||'';
    renderFileList(msg.entries||[]);
  }
}

// ── Render ────────────────────────────────────────────────────────────
function renderFrame(jpeg){
  const blob=new Blob([jpeg],{type:'image/jpeg'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    if(canvas.width!==img.width)canvas.width=img.width;
    if(canvas.height!==img.height)canvas.height=img.height;
    ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

function updateFps(){
  const now=Date.now();
  const fps=Math.round(frameCount*1000/(now-lastFpsT));
  document.getElementById('fps-label').textContent=fps+'fps';
  frameCount=0; lastFpsT=now;
}

// ── Zoom & Pan ─────────────────────────────────────────────────────────
let viewZoom=1, viewPanX=0, viewPanY=0;
const MIN_ZOOM=0.9, MAX_ZOOM=8;

function applyView(){
  if(viewZoom===1&&viewPanX===0&&viewPanY===0){
    canvas.style.transform='';
  }else{
    canvas.style.transform=
      `translate(${viewPanX}px,${viewPanY}px) scale(${viewZoom})`;
  }
  document.getElementById('zoom-btn').textContent=
    (viewZoom===1)?'⊡ fit':Math.round(viewZoom*100)+'%';
}

function zoomBy(factor, pivotX, pivotY){
  const newZoom=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,viewZoom*factor));
  if(pivotX!==undefined){
    // Zoom toward a pivot point (pinch center) in viewport coords
    const r=canvas.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    // The pivot in canvas-center coordinates (before new zoom):
    const dx=pivotX-cx, dy=pivotY-cy;
    viewPanX+= dx*(1-newZoom/viewZoom);
    viewPanY+= dy*(1-newZoom/viewZoom);
  }
  viewZoom=newZoom;
  if(viewZoom<1.05){viewZoom=1;viewPanX=0;viewPanY=0;}
  applyView();
}

function resetView(){viewZoom=1;viewPanX=0;viewPanY=0;applyView();}

// ── Touch → Mouse ─────────────────────────────────────────────────────
const wrap=document.getElementById('canvas-wrap');
let lastTouchX=0,lastTouchY=0,touchStartX=0,touchStartY=0,touchMoved=false;

function getRemote(touch){
  const r=canvas.getBoundingClientRect();
  const scaleX=remoteW/r.width, scaleY=remoteH/r.height;
  return{
    x:Math.max(0,Math.min(remoteW-1,Math.round((touch.clientX-r.left)*scaleX))),
    y:Math.max(0,Math.min(remoteH-1,Math.round((touch.clientY-r.top)*scaleY)))
  };
}

function sendMouse(ev,x,y,btn='left',pressed=true){
  if(!ws||ws.readyState!==1)return;
  ws.send(encodeJson(MSG_MOUSE,{event:ev,x,y,button:btn,pressed}));
}

// ── Single-finger: mouse control ───────────────────────────────────────
wrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length>1)return;
  const t=e.touches[0];
  const {x,y}=getRemote(t);
  touchStartX=t.clientX; touchStartY=t.clientY;
  lastTouchX=x; lastTouchY=y;
  touchMoved=false;
  sendMouse('move',x,y);
},{passive:false});

wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length>1)return;
  const t=e.touches[0];
  const {x,y}=getRemote(t);
  const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
  if(Math.abs(dx)>5||Math.abs(dy)>5)touchMoved=true;
  lastTouchX=x; lastTouchY=y;
  sendMouse('move',x,y);
},{passive:false});

wrap.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.changedTouches.length>0&&e.touches.length===0&&!touchMoved){
    sendMouse('click',lastTouchX,lastTouchY,'left',true);
    setTimeout(()=>sendMouse('click',lastTouchX,lastTouchY,'left',false),80);
  }
},{passive:false});

// ── Long press = right click ───────────────────────────────────────────
let longPressTimer=null;
wrap.addEventListener('touchstart',e=>{
  if(e.touches.length>1){clearTimeout(longPressTimer);return;}
  longPressTimer=setTimeout(()=>{
    const t=e.touches[0];
    const {x,y}=getRemote(t);
    touchMoved=true; // prevent click on touchend
    sendMouse('click',x,y,'right',true);
    setTimeout(()=>sendMouse('click',x,y,'right',false),80);
    if(navigator.vibrate)navigator.vibrate(40);
  },600);
},{passive:false});
wrap.addEventListener('touchend',()=>clearTimeout(longPressTimer),{passive:false});
wrap.addEventListener('touchmove',()=>clearTimeout(longPressTimer),{passive:false});

// ── Two-finger: pinch-to-zoom + pan ───────────────────────────────────
let pinchStartDist=0, pinchStartZoom=1;
let pinchStartPanX=0, pinchStartPanY=0;
let pinchStartMidX=0, pinchStartMidY=0;

wrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    pinchStartDist=Math.hypot(
      e.touches[1].clientX-e.touches[0].clientX,
      e.touches[1].clientY-e.touches[0].clientY);
    pinchStartZoom=viewZoom;
    pinchStartPanX=viewPanX; pinchStartPanY=viewPanY;
    pinchStartMidX=(e.touches[0].clientX+e.touches[1].clientX)/2;
    pinchStartMidY=(e.touches[0].clientY+e.touches[1].clientY)/2;
  }
},{passive:false});

wrap.addEventListener('touchmove',e=>{
  if(e.touches.length!==2)return;
  e.preventDefault();
  const dist=Math.hypot(
    e.touches[1].clientX-e.touches[0].clientX,
    e.touches[1].clientY-e.touches[0].clientY);
  const midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
  const midY=(e.touches[0].clientY+e.touches[1].clientY)/2;

  const newZoom=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,
    pinchStartZoom*dist/pinchStartDist));

  // Pan: track midpoint movement + zoom-induced shift toward pivot
  const r=canvas.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const dx=pinchStartMidX-cx, dy=pinchStartMidY-cy;

  viewZoom=newZoom;
  viewPanX=pinchStartPanX+(midX-pinchStartMidX)+dx*(1-newZoom/pinchStartZoom);
  viewPanY=pinchStartPanY+(midY-pinchStartMidY)+dy*(1-newZoom/pinchStartZoom);

  if(viewZoom<1.05){viewZoom=1;viewPanX=0;viewPanY=0;}
  applyView();
},{passive:false});

// ── Keyboard ──────────────────────────────────────────────────────────
const kbdInput=document.getElementById('kbd-input');
let kbdPrev='';

function toggleKbd(){
  const btn=document.getElementById('btn-kbd');
  if(document.activeElement===kbdInput){
    kbdInput.blur();
    btn.classList.remove('active');
  } else {
    kbdInput.value='x'; kbdPrev='x';
    kbdInput.focus();
    btn.classList.add('active');
  }
}

kbdInput.addEventListener('keydown',e=>{
  if(!ws||ws.readyState!==1)return;
  const map={
    Enter:'enter',Backspace:'backspace',Tab:'tab',Escape:'escape',
    Delete:'delete',ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',
    ArrowRight:'right',Home:'home',End:'end',PageUp:'page_up',
    PageDown:'page_down',F1:'f1',F2:'f2',F3:'f3',F4:'f4',F5:'f5',
    F6:'f6',F7:'f7',F8:'f8',F9:'f9',F10:'f10',F11:'f11',F12:'f12',
    Control:'ctrl',Alt:'alt',Shift:'shift',Meta:'win',CapsLock:'caps_lock',
  };
  const key=map[e.key]||(e.key.length===1?e.key:null);
  if(!key)return;
  ws.send(encodeJson(MSG_KEY,{event:'press',key}));
  setTimeout(()=>ws.send(encodeJson(MSG_KEY,{event:'release',key})),50);
});

kbdInput.addEventListener('input',e=>{
  const cur=kbdInput.value;
  if(cur.length>kbdPrev.length){
    const ch=cur.slice(kbdPrev.length);
    for(const c of ch){
      if(c&&c!=='x'||kbdPrev==='x'){
        const key=c==='x'&&kbdPrev==='x'?'backspace':c;
        if(key!=='x'){
          ws.send(encodeJson(MSG_KEY,{event:'press',key}));
          setTimeout(()=>ws.send(encodeJson(MSG_KEY,{event:'release',key})),50);
        }
      }
    }
  } else if(cur.length<kbdPrev.length){
    ws.send(encodeJson(MSG_KEY,{event:'press',key:'backspace'}));
    setTimeout(()=>ws.send(encodeJson(MSG_KEY,{event:'release',key:'backspace'})),50);
  }
  kbdInput.value='x'; kbdPrev='x';
});

// ── Audio ─────────────────────────────────────────────────────────────
function toggleAudio(){
  audioEnabled=!audioEnabled;
  const btn=document.getElementById('btn-audio');
  btn.textContent=audioEnabled?'🔊 Son':'🔇 Son';
  btn.classList.toggle('active',audioEnabled);
  if(ws&&ws.readyState===1)
    ws.send(encodeJson(MSG_AUDIO_CFG,{enabled:audioEnabled}));
  if(audioEnabled&&!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:audioSR});
  }
}

let nextAudioTime=0;
function playAudioChunk(msg){
  if(!audioCtx)return;
  try{
    const pcm=new Int16Array(msg.pcm.buffer);
    const ch=msg.ch||1;
    const frames=pcm.length/ch;
    const buf=audioCtx.createBuffer(ch,frames,msg.sr||48000);
    for(let c=0;c<ch;c++){
      const data=buf.getChannelData(c);
      for(let i=0;i<frames;i++)
        data[i]=pcm[i*ch+c]/32768;
    }
    const src=audioCtx.createBufferSource();
    src.buffer=buf;
    src.connect(audioCtx.destination);
    const now=audioCtx.currentTime;
    if(nextAudioTime<now)nextAudioTime=now+0.05;
    src.start(nextAudioTime);
    nextAudioTime+=buf.duration;
  }catch(e){}
}

// ── Chat ──────────────────────────────────────────────────────────────
function openChat(){
  document.getElementById('file-panel').classList.remove('open');
  document.getElementById('chat-panel').classList.toggle('open');
}
function openFiles(){
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('file-panel').classList.toggle('open');
  if(document.getElementById('file-panel').classList.contains('open')&&!fileCurPath){
    fileBrowse('');
  }
}
function closePanel(id){document.getElementById(id).classList.remove('open');}

function sendChatMsg(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text||!ws||ws.readyState!==1)return;
  ws.send(encodeJson(MSG_CHAT,{text,sender:'client',ts:Math.floor(Date.now()/1000)}));
  appendChat(text,'client');
  inp.value='';
}
document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('chat-input');
  if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')sendChatMsg();});

  // File input : listener robuste pour Android
  const fi=document.getElementById('file-input');
  fi.addEventListener('change',function(){
    if(this.files&&this.files[0])uploadFile(this.files[0]);
  });
});

function appendChat(text, sender){
  const log=document.getElementById('chat-log');
  const d=document.createElement('div');
  d.className='chat-msg '+(sender==='client'?'me':'host');
  const who=sender==='client'?'Vous':'Host';
  const t=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  d.innerHTML=`<div class="who">${who} ${t}</div>${escHtml(text)}`;
  log.appendChild(d);
  log.scrollTop=log.scrollHeight;
  // Flash tab if panel closed
  if(!document.getElementById('chat-panel').classList.contains('open')&&sender==='host'){
    const btn=document.querySelector('.tbtn[onclick="openChat()"]');
    if(btn){btn.textContent='💬 Chat ●';setTimeout(()=>{btn.textContent='💬 Chat';},3000);}
  }
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── File browser / upload ─────────────────────────────────────────────
function fileBrowse(path){
  if(!ws||ws.readyState!==1)return;
  const id=Date.now()&0xFFFFFFFF;
  document.getElementById('file-path-lbl').textContent='⏳…';
  document.getElementById('file-list').innerHTML='';
  ws.send(encodeJson(MSG_FILE_BROWSE,{id,path:path||''}));
}
function fileBrowseParent(){if(fileCurParent)fileBrowse(fileCurParent);}

function renderFileList(entries){
  const lbl=document.getElementById('file-path-lbl');
  lbl.textContent=fileCurPath||'/';
  const list=document.getElementById('file-list');
  list.innerHTML='';
  entries.forEach(e=>{
    const div=document.createElement('div');
    div.className='file-entry';
    const icon=e.is_dir?'📁':'📄';
    const size=e.is_dir?'':fmtSize(e.size);
    div.innerHTML=`<span class="file-icon">${icon}</span>`
      +`<span class="file-name">${escHtml(e.name)}</span>`
      +`<span class="file-size">${size}</span>`;
    div.onclick=()=>{
      if(e.is_dir){
        // Navigate into folder
        const sep=(fileCurPath&&!fileCurPath.endsWith('/')&&!fileCurPath.endsWith('\\'))?
                  (fileCurPath.includes('\\')?'\\':'/') : '';
        fileBrowse(fileCurPath+sep+e.name);
      } else {
        fileDownload(e.name);
      }
    };
    list.appendChild(div);
  });
}

function fileDownload(name){
  if(!ws||ws.readyState!==1)return;
  const sep=fileCurPath.includes('\\')?'\\':'/';
  const path=fileCurPath+sep+name;
  const tid=Date.now()&0xFFFFFFFF;
  ws.send(encodeJson(MSG_FILE_GET_REQ,{id:tid,path}));
  showFileProgress(true, name, 0, 0);
}

async function uploadFile(file){
  if(!file||!ws||ws.readyState!==1){setUploadStatus('❌ Non connecté');return;}
  const tid=Date.now()&0xFFFFFFFF;
  fileUploadId=tid;

  // Reset input tout de suite → 2ème fichier possible immédiatement
  document.getElementById('file-input').value='';

  document.getElementById('file-progress').style.display='flex';
  document.getElementById('file-prog-fill').style.width='0%';
  document.getElementById('file-prog-lbl').textContent='0 / '+fmtSize(file.size);

  try{
    // 1. Demander l'autorisation au PC
    setUploadStatus('⏳ Préparation…');
    ws.send(encodeJson(MSG_FILE_SEND_REQ,{id:tid,name:file.name,size:file.size}));

    // Attendre l'ACK du PC avant d'envoyer quoi que ce soit
    await new Promise((resolve,reject)=>{
      fileAckWaiters[tid]={resolve,reject};
      setTimeout(()=>{
        if(fileAckWaiters[tid]){
          delete fileAckWaiters[tid];
          reject(new Error('Le PC ne répond pas (timeout ACK)'));
        }
      },8000);
    });

    setUploadStatus('⏳ Envoi de '+file.name+'…');

    // 2. Envoyer par morceaux — lecture à la volée (pas de chargement total en RAM)
    const CHUNK=32768;
    let sent=0;
    while(sent<file.size){
      if(fileUploadId!==tid||!ws||ws.readyState!==1)
        throw new Error('Connexion perdue');

      // Lire le prochain morceau depuis le fichier
      const slice=file.slice(sent,sent+CHUNK);
      const chunkData=new Uint8Array(await slice.arrayBuffer());

      // Backpressure : pause si le buffer réseau est plein
      while(ws.bufferedAmount>256*1024)
        await new Promise(r=>setTimeout(r,50));

      ws.send(encodeFileChunk(tid,chunkData));
      sent+=chunkData.length;

      const pct=Math.round(sent*100/file.size);
      document.getElementById('file-prog-fill').style.width=pct+'%';
      document.getElementById('file-prog-lbl').textContent=
        fmtSize(sent)+' / '+fmtSize(file.size);

      // Cède la main à l'event loop
      await new Promise(r=>setTimeout(r,10));
    }

    ws.send(encodeJson(MSG_FILE_DONE,{id:tid,name:file.name}));
    setUploadStatus('✅ '+file.name+' envoyé !');
    document.getElementById('file-prog-fill').style.width='100%';

  }catch(e){
    // Annuler le transfert côté PC si déjà démarré
    if(ws&&ws.readyState===1)
      ws.send(encodeJson(MSG_FILE_ABORT,{id:tid,reason:e.message}));
    setUploadStatus('❌ '+e.message);
    delete fileAckWaiters[tid];
  }finally{
    fileUploadId=null;
  }
}
function setUploadStatus(txt){
  document.getElementById('file-prog-lbl').textContent=txt;
  document.getElementById('file-progress').style.display='flex';
}
function showFileProgress(show, name, recv, total){
  const fp=document.getElementById('file-progress');
  fp.style.display=show?'flex':'none';
  if(show){
    const pct=total>0?Math.round(recv*100/total):0;
    document.getElementById('file-prog-fill').style.width=pct+'%';
    document.getElementById('file-prog-lbl').textContent=
      (name||'')+(total>0?' — '+fmtSize(recv)+'/'+fmtSize(total):'');
  }
}
function fmtSize(n){
  if(n>=1e9)return(n/1e9).toFixed(1)+' Go';
  if(n>=1e6)return(n/1e6).toFixed(1)+' Mo';
  if(n>=1e3)return(n/1e3).toFixed(1)+' Ko';
  return n+' o';
}

// ── Controls ──────────────────────────────────────────────────────────
function sendCtrlAltDel(){
  if(!ws||ws.readyState!==1)return;
  ['ctrl','alt','delete'].forEach(k=>ws.send(encodeJson(MSG_KEY,{event:'press',key:k})));
  setTimeout(()=>
    ['ctrl','alt','delete'].forEach(k=>ws.send(encodeJson(MSG_KEY,{event:'release',key:k}))),100);
}

function sendKey(k){
  if(!ws||ws.readyState!==1)return;
  ws.send(encodeJson(MSG_KEY,{event:'press',key:k}));
  setTimeout(()=>ws.send(encodeJson(MSG_KEY,{event:'release',key:k})),80);
}

function disconnect(){
  if(ws)ws.close();
  showConnect('');
}

function showConnect(msg){
  document.getElementById('viewer').style.display='none';
  document.getElementById('connect').style.display='flex';
  setStatus(msg);
  // Pré-remplit les champs avec la dernière session
  const lastSid=sessionStorage.getItem('lastSid');
  const lastPwd=sessionStorage.getItem('lastPwd');
  const lastRelay=sessionStorage.getItem('lastRelay');
  if(lastSid)document.getElementById('session-id').value=lastSid;
  if(lastPwd)document.getElementById('password').value=lastPwd;
  if(lastRelay)document.getElementById('relay-url').value=lastRelay;
  audioEnabled=false;
  if(audioCtx){audioCtx.close();audioCtx=null;}
  nextAudioTime=0;
}
</script>
